[build]
  publish = "."

# Block access to sensitive files
[[headers]]
  for = "/.env"
  [headers.values]
    X-Robots-Tag = "noindex"

[[redirects]]
  from = "/.env"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/.gitignore"
  to = "/index.html"
  status = 404
  force = true
