<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="baby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
  </defs>

  <!-- Full background (maskable safe zone) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative sparkles -->
  <circle cx="110" cy="110" r="5" fill="white" opacity="0.4"/>
  <circle cx="400" cy="120" r="4" fill="white" opacity="0.35"/>
  <circle cx="100" cy="380" r="4" fill="white" opacity="0.3"/>
  <circle cx="410" cy="400" r="5" fill="white" opacity="0.35"/>

  <!-- Heart shape centered (safe zone: 80% center) -->
  <g transform="translate(256, 240)">
    <path d="M0 50 C0 50, -100 -50, -100 -35 C-100 8, -50 18, 0 68 C50 18, 100 8, 100 -35 C100 -50, 0 50, 0 50 Z"
          fill="url(#heart)"
          transform="scale(1.3)"/>
  </g>

  <!-- Baby silhouette -->
  <g transform="translate(256, 235)">
    <circle cx="0" cy="-25" r="28" fill="url(#baby)" opacity="0.85"/>
    <ellipse cx="4" cy="15" rx="22" ry="30" fill="url(#baby)" opacity="0.75" transform="rotate(-10)"/>
    <circle cx="12" cy="-20" r="5" fill="#f9a8d4" opacity="0.6"/>
    <path d="M-8 -29 Q-3 -33 2 -29" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M-3 -18 Q0 -15 3 -18" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Small medical cross -->
  <g transform="translate(330, 160)">
    <circle cx="0" cy="0" r="16" fill="white" opacity="0.85"/>
    <rect x="-6" y="-2.5" width="12" height="5" rx="2.5" fill="#ec4899"/>
    <rect x="-2.5" y="-6" width="5" height="12" rx="2.5" fill="#ec4899"/>
  </g>
</svg>
